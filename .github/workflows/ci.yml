name: CI

on:
  pull_request:
    branches: [dev, main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Python 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 가상환경 생성 및 의존성 설치
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: ruff 린트 검사
        run: |
          source .venv/bin/activate
          ruff check .

      - name: pytest 실행 (외부 API 미호출)
        run: |
          source .venv/bin/activate
          pytest tests/ -v --cov=services --cov=clients --cov-report=term-missing

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 환경 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 의존성 설치
        run: npm ci

      - name: ESLint 검사
        run: npm run lint

      - name: TypeScript 타입 검사
        run: npx tsc --noEmit

      - name: Vitest 단위 테스트
        run: npx vitest run
