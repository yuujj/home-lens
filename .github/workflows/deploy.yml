name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 백엔드 배포 확인 (Railway 자동 배포)
        run: echo "Railway GitHub 연동으로 자동 배포 트리거됨"
      - name: 백엔드 헬스체크 (배포 완료 후 60초 대기)
        run: |
          sleep 60
          curl -f https://home-lens-api.up.railway.app/api/health \
            --retry 5 --retry-delay 10 --retry-connrefused \
            -o /dev/null -s -w "HTTP %{http_code}\n" \
            && echo "백엔드 헬스체크 통과" \
            || echo "헬스체크 실패 — Railway 대시보드에서 배포 상태 확인 필요"

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 프론트엔드 배포 확인 (Vercel 자동 배포)
        run: echo "Vercel GitHub 연동으로 자동 배포 트리거됨"
      - name: 프론트엔드 접근 가능 여부 확인
        run: |
          sleep 30
          curl -f https://home-lens.vercel.app \
            --retry 3 --retry-delay 15 \
            -o /dev/null -s -w "HTTP %{http_code}\n" \
            && echo "프론트엔드 접근 확인" \
            || echo "접근 확인 실패 — Vercel 대시보드에서 배포 상태 확인 필요"
